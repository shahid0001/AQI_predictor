name: AQI CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Upgrade pip
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      # 4. Clear cache (important for Hopsworks issues)
      - name: Clear pip cache
        run: |
          pip cache purge

      # 5. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 6. Install missing Hopsworks dependencies (IMPORTANT FIX)
      - name: Install Delta Lake dependencies
        run: |
          pip install deltalake
          pip install hops-deltalake

      - name: Run ingestion
        env:
          API_KEY: ${{ secrets.API_KEY }}
          HOPSWORKS_KEY: ${{ secrets.HOPSWORKS_KEY }}
          LAT: 28.4212
          LON: 70.2989
        run: python -m ingestion.ingestion